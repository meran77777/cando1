# SCENARIO 1 — FOREIGN server (exit anchor).
# The client in Iran forwards chosen local ports out through this server.
# Run:  cando1 server -c scenario1-foreign-server.toml
[log]
level = "info"

[server]
bind_addr = "0.0.0.0:443"
transport = "tls"                         # tls | wss | ws | tcp
token     = "CHANGE-ME-to-a-long-random-token"
allow_forward = true                      # server dials the targets the client asks for
# forward_whitelist = ["127.0.0.1:1194", "1.1.1.1:22"]   # optional: restrict targets

[server.tls]
self_name = "www.example.com"          # SAN embedded in the auto self-signed cert
cert = ""                                 # set to use a real certificate instead
key  = ""

[server.mux]
enable = true
keepalive_seconds  = 10
max_stream_buffer  = 8388608
max_receive_buffer = 33554432
