name: ci

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./... -count=1 -race -timeout 180s
      - name: Build
        run: go build -trimpath -o cando1 .
